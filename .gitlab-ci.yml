image: node:20

stages:
  - deploy

deploy-pages:
  stage: deploy
  script:
    - cd frontend
    - npm ci
    - npm run build
    - cd ..
    - rm -rf public
    - mkdir public
    - cp -r frontend/dist/* public/
    - cp public/index.html public/404.html
  pages: true
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'